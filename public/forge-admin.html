*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg0:#0f0e0c;--bg1:#1a1814;--bg2:#232019;--bg3:#2c2820;--bg4:#3a3528;
  --br1:#3a3528;--br2:#4a4435;--br3:#5a5342;
  --tx1:#e8e0d0;--tx2:#c8c0b0;--tx3:#9a9285;--tx4:#6a6358;
  --gold:#c8a84a;--gold2:#a08030;--golddim:#7a6828;
  --red:#c04040;--reddim:#803030;--green:#50a050;--greendim:#306830;
  --amber:#c89030;--blue:#5090c8;--bluedim:#305a80;
  --fd:'Cinzel',serif;--fb:'Crimson Text',serif;--fm:'JetBrains Mono',monospace;
  --r:4px;--shadow:0 2px 8px rgba(0,0,0,.4);
}
html,body,#root{height:100%;overflow:hidden;}
body{background:var(--bg0);color:var(--tx1);font-family:var(--fb);font-size:15px;}
::selection{background:var(--gold);color:var(--bg0);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg1);}
::-webkit-scrollbar-thumb{background:var(--br3);border-radius:3px;}

.app{display:flex;flex-direction:column;height:100vh;}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg0);}
.login-box{background:var(--bg1);border:1px solid var(--br2);border-radius:8px;padding:32px;width:340px;box-shadow:var(--shadow);}
.login-logo{font-family:var(--fd);font-size:1.1rem;font-weight:700;letter-spacing:.18em;color:var(--gold);text-align:center;margin-bottom:4px;}
.login-sub{font-family:var(--fd);font-size:.38rem;letter-spacing:.28em;color:var(--tx4);text-transform:uppercase;text-align:center;margin-bottom:24px;}
.login-box label{display:block;font-family:var(--fd);font-size:.4rem;letter-spacing:.12em;color:var(--tx3);text-transform:uppercase;margin-bottom:4px;margin-top:14px;}
.login-box label:first-of-type{margin-top:0;}
.login-box input{width:100%;background:var(--bg2);border:1px solid var(--br2);color:var(--tx1);font-family:var(--fb);font-size:.9rem;padding:9px 12px;border-radius:var(--r);outline:none;}
.login-box input:focus{border-color:var(--gold2);}
.login-err{color:var(--red);font-size:.8rem;margin-top:10px;text-align:center;}
.login-actions{display:flex;gap:8px;margin-top:20px;}
.login-actions .btn{flex:1;text-align:center;padding:10px;}

/* Header */
.hdr{background:var(--bg1);border-bottom:1px solid var(--gold2);padding:0 20px;display:flex;align-items:center;height:52px;flex-shrink:0;gap:16px;}
.logo{font-family:var(--fd);font-size:1rem;font-weight:700;letter-spacing:.18em;color:var(--gold);text-shadow:0 1px 4px rgba(0,0,0,.5);}
.logo-sub{font-family:var(--fd);font-size:.38rem;letter-spacing:.3em;color:var(--tx4);text-transform:uppercase;margin-top:1px;}
.hdr-sep{width:1px;height:22px;background:var(--br2);}
.hdr-stats{display:flex;gap:16px;align-items:center;}
.hstat{text-align:center;}
.hstat .n{font-family:var(--fm);font-size:.85rem;color:var(--gold);display:block;line-height:1;}
.hstat .l{font-size:.38rem;letter-spacing:.16em;color:var(--tx4);text-transform:uppercase;font-family:var(--fd);}
.hdr-actions{margin-left:auto;display:flex;gap:8px;align-items:center;}
.hdr-user{font-family:var(--fm);font-size:.68rem;color:var(--tx4);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Buttons */
.btn{font-family:var(--fd);font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;padding:7px 14px;border-radius:var(--r);cursor:pointer;border:1px solid var(--br2);background:var(--bg3);color:var(--tx2);transition:all .15s;}
.btn:hover{background:var(--bg4);color:var(--tx1);border-color:var(--br3);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-gold{background:linear-gradient(135deg,var(--gold2),var(--golddim));color:var(--bg0);border-color:var(--gold);font-weight:600;}
.btn-gold:hover{background:linear-gradient(135deg,var(--gold),var(--gold2));}
.btn-red{border-color:var(--reddim);color:var(--red);}
.btn-red:hover{background:var(--reddim);color:var(--tx1);}
.btn-green{border-color:var(--greendim);color:var(--green);}
.btn-green:hover{background:var(--greendim);color:var(--tx1);}
.btn-sm{padding:4px 10px;font-size:.46rem;}

/* Toolbar */
.toolbar{background:var(--bg1);border-bottom:1px solid var(--br1);padding:8px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.tb-group{display:flex;align-items:center;gap:6px;}
.tb-label{font-family:var(--fd);font-size:.4rem;letter-spacing:.16em;color:var(--tx4);text-transform:uppercase;margin-right:2px;}
select.tb-sel{background:var(--bg2);border:1px solid var(--br2);color:var(--tx2);font-family:var(--fb);font-size:.82rem;padding:5px 8px;border-radius:var(--r);cursor:pointer;outline:none;}
select.tb-sel:focus{border-color:var(--gold2);}
input.tb-search{background:var(--bg2);border:1px solid var(--br2);color:var(--tx1);font-family:var(--fb);font-size:.82rem;padding:5px 10px;border-radius:var(--r);width:200px;outline:none;}
input.tb-search:focus{border-color:var(--gold2);}
input.tb-search::placeholder{color:var(--tx4);}
.tb-count{font-family:var(--fm);font-size:.72rem;color:var(--tx3);margin-left:4px;}
.tb-sep{width:1px;height:20px;background:var(--br1);margin:0 4px;}
.tb-spacer{flex:1;}

/* Table */
.table-wrap{flex:1;overflow:auto;padding:0;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
thead{position:sticky;top:0;z-index:10;}
th{background:var(--bg2);border-bottom:2px solid var(--gold2);padding:8px 10px;text-align:left;font-family:var(--fd);font-size:.42rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);white-space:nowrap;cursor:pointer;user-select:none;position:relative;}
th:hover{color:var(--tx1);}
th .sort-arrow{margin-left:4px;font-size:.5rem;color:var(--tx4);}
th.active .sort-arrow{color:var(--gold);}
tr{border-bottom:1px solid var(--br1);transition:background .1s;}
tr:hover{background:var(--bg2);}
tr.flagged{background:rgba(192,64,64,.08);}
tr.flagged:hover{background:rgba(192,64,64,.14);}
td{padding:5px 10px;font-size:.88rem;vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
td.mono{font-family:var(--fm);font-size:.78rem;color:var(--tx2);}

/* Column widths */
.col-flag{width:32px;text-align:center;}
.col-name{width:22%;}
.col-faction{width:14%;}
.col-game{width:10%;}
.col-cat{width:7%;}
.col-base{width:7%;}
.col-sizes{width:16%;}
.col-img{width:18%;}
.col-actions{width:60px;text-align:center;}

/* Image preview */
.img-thumb{width:32px;height:32px;object-fit:cover;border-radius:3px;border:1px solid var(--br2);vertical-align:middle;margin-right:6px;cursor:pointer;background:var(--bg3);}
.img-thumb-empty{width:32px;height:32px;border-radius:3px;border:1px dashed var(--br2);display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--tx4);vertical-align:middle;margin-right:6px;cursor:pointer;}
.img-url{font-family:var(--fm);font-size:.68rem;color:var(--tx3);max-width:160px;overflow:hidden;text-overflow:ellipsis;display:inline-block;vertical-align:middle;}

/* Sizes chips */
.sizes-chips{display:flex;gap:3px;flex-wrap:wrap;}
.sz-chip{font-family:var(--fm);font-size:.66rem;background:var(--bg3);border:1px solid var(--br1);border-radius:3px;padding:1px 5px;color:var(--tx2);white-space:nowrap;}

/* Flag dot */
.flag-dot{width:8px;height:8px;border-radius:50%;display:inline-block;cursor:pointer;}
.flag-dot.ok{background:var(--green);}
.flag-dot.missing{background:var(--amber);}
.flag-dot.error{background:var(--red);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--bg1);border:1px solid var(--br2);border-radius:8px;padding:24px;max-width:560px;width:95%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.modal h2{font-family:var(--fd);font-size:.72rem;letter-spacing:.14em;color:var(--gold);margin-bottom:16px;text-transform:uppercase;}
.modal label{display:block;font-family:var(--fd);font-size:.4rem;letter-spacing:.12em;color:var(--tx3);text-transform:uppercase;margin-bottom:4px;margin-top:12px;}
.modal label:first-of-type{margin-top:0;}
.modal input,.modal select,.modal textarea{width:100%;background:var(--bg2);border:1px solid var(--br2);color:var(--tx1);font-family:var(--fb);font-size:.88rem;padding:7px 10px;border-radius:var(--r);outline:none;}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--gold2);}
.modal textarea{resize:vertical;min-height:60px;font-family:var(--fm);font-size:.78rem;}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;}
.modal .img-preview{width:100%;max-height:200px;object-fit:contain;border-radius:var(--r);border:1px solid var(--br2);margin-top:8px;background:var(--bg0);}
.sizes-editor{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.sz-row{display:flex;gap:6px;align-items:center;}
.sz-row input{width:80px;}
.sz-row .btn-sm{flex-shrink:0;}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--br3);color:var(--tx1);font-family:var(--fb);font-size:.85rem;padding:10px 20px;border-radius:6px;box-shadow:var(--shadow);z-index:200;animation:toastIn .25s ease;}
.toast.success{border-color:var(--greendim);}
.toast.error{border-color:var(--reddim);}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* Import drop zone */
.dropzone{border:2px dashed var(--br2);border-radius:8px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;}
.dropzone:hover,.dropzone.dragover{border-color:var(--gold);background:rgba(200,168,74,.05);}
.dropzone-icon{font-size:2rem;margin-bottom:8px;}
.dropzone-text{font-family:var(--fd);font-size:.56rem;letter-spacing:.1em;color:var(--tx3);text-transform:uppercase;}
.dropzone-sub{font-size:.8rem;color:var(--tx4);margin-top:4px;}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;padding:40px;}
.empty-icon{font-size:3rem;}
.empty-title{font-family:var(--fd);font-size:.72rem;letter-spacing:.12em;color:var(--tx3);text-transform:uppercase;}
.empty-text{font-size:.88rem;color:var(--tx4);text-align:center;max-width:400px;line-height:1.5;}

/* Status bar */
.status-bar{background:var(--bg1);border-top:1px solid var(--br1);padding:5px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;font-size:.75rem;color:var(--tx4);}
.status-bar .dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;}
.status-bar .dot.g{background:var(--green);}
.status-bar .dot.a{background:var(--amber);}
.status-bar .dot.r{background:var(--red);}

/* Publish progress */
.publish-progress{margin-top:12px;background:var(--bg2);border-radius:var(--r);overflow:hidden;height:20px;position:relative;}
.publish-bar{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));transition:width .3s;border-radius:var(--r);}
.publish-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.68rem;color:var(--tx1);}

/* Fetch button in modal */
.fetch-btn-group{display:flex;gap:6px;align-items:center;margin-top:8px;}

@media(max-width:900px){
  .hdr{padding:0 12px;gap:10px;}
  .toolbar{padding:6px 12px;}
  .col-game,.col-cat,.col-base{display:none;}
  td,th{padding:4px 6px;font-size:.8rem;}
}
</style>
</head>

// ── PDF Parsing ──

/* Helper: extract text items from a pdf.js page and group into lines by Y position.
   pdf.js items have .str (text) and .transform[4]=x, .transform[5]=y */
function itemsToLines(items) {
  if (!items.length) return [];
  /* Sort by Y descending (top of page = high Y), then X ascending */
  const sorted = items
    .filter(it => it.str.trim())
    .map(it => ({ str: it.str, x: it.transform[4], y: it.transform[5], w: it.width || 0 }))
    .sort((a, b) => b.y - a.y || a.x - b.x);

  const lines = [];
  let curY = sorted[0]?.y;
  let curLine = [];
  for (const it of sorted) {
    if (Math.abs(it.y - curY) > 3) {          /* new line */
      lines.push(curLine);
      curLine = [];
      curY = it.y;
    }
    curLine.push(it);
  }
  if (curLine.length) lines.push(curLine);
  return lines.map(ln => ln.map(it => it.str).join(" ").replace(/\s+/g, " ").trim());
}

/* ── 40k Munitorum Field Manual parser ──
   Each page has a CODEX: / INDEX: header followed by unit entries.
   Unit name lines are followed by "N model(s) ......... NNN pts" lines.
   Multi-column: we just concatenate all text items into lines per Y coord. */
async function parse40kPDF(pdf) {
  const factionUnits = {};         /* faction -> { unitName -> [{m,p}] } */
  let currentFaction = "";
  let currentUnit = "";
  const SKIP_RE = /DETACHMENT ENHANCEMENTS|FORGE WORLD POINTS VALUES|CONTENTS|PRODUCED BY|Munitorum Field Manual|VERSION \d|Welcome to the|You can use this|This document|points values|Increases and Decreases|Crusade|Entries that|the last iteration|in parentheses|highlighted when|your games|periodically|game balance|Supply Limit|pages? \d/i;

  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const tc = await page.getTextContent();
    const lines = itemsToLines(tc.items);

    for (const line of lines) {
      /* Faction header */
      const facMatch = line.match(/^(?:CODEX|INDEX)\s*:\s*(.+)$/i);
      if (facMatch) {
        currentFaction = facMatch[1].trim();
        /* Clean up: sometimes "CODEX: ADEPTA SORORITAS" has trailing junk */
        currentFaction = currentFaction.replace(/\s{2,}.*/, "").trim();
        if (!factionUnits[currentFaction]) factionUnits[currentFaction] = {};
        currentUnit = "";
        continue;
      }
      /* Unaligned forces header (no CODEX: prefix) */
      if (/^UNALIGNED FORCES$/i.test(line)) {
        currentFaction = "Unaligned Forces";
        if (!factionUnits[currentFaction]) factionUnits[currentFaction] = {};
        currentUnit = "";
        continue;
      }
      if (!currentFaction) continue;
      /* Skip non-unit sections */
      if (SKIP_RE.test(line)) continue;
      if (/^\d+$/.test(line.trim())) continue; /* page numbers */

      /* Model/points pattern:  "N model(s) ...... (±X) NNN pts" */
      const mpRe = /(\d+)\s+models?\s*[.\u2026\u2024…·]+\s*(?:\([+-]?\d+\)\s*)?(\d+)\s*pts/gi;
      let match;
      const foundSizes = [];
      while ((match = mpRe.exec(line)) !== null) {
        foundSizes.push({ m: parseInt(match[1]), p: parseInt(match[2]) });
      }

      if (foundSizes.length > 0 && currentUnit) {
        for (const sz of foundSizes) {
          factionUnits[currentFaction][currentUnit].push(sz);
        }
      } else if (foundSizes.length === 0) {
        /* Potential unit name line — must not be a header/noise */
        const cleaned = line.replace(/\s{2,}/g, "  ").trim();
        /* Split on double-space (two-column layout merges two unit names on one line) */
        const parts = cleaned.split(/\s{2,}/).filter(n => n && n.length > 1);
        for (const part of parts) {
          const t = part.trim();
          if (!t || /^(pts|models?|CODEX|INDEX|DETACHMENT|FORGE WORLD|\d+$)/i.test(t)) continue;
          if (t.length < 2 || t.length > 60) continue;
          /* This looks like a unit name */
          currentUnit = t;
          if (!factionUnits[currentFaction][currentUnit]) {
            factionUnits[currentFaction][currentUnit] = [];
          }
        }
      }
    }
  }

  /* Convert to flat array, skip units with no sizes */
  const result = [];
  for (const fac of Object.keys(factionUnits)) {
    const game = FACTION_META[fac]?.game || "Warhammer 40,000";
    for (const [name, sizes] of Object.entries(factionUnits[fac])) {
      if (sizes.length === 0) continue;
      result.push({
        id: uid(), name, faction: fac, game,
        cat: "unit", base: "", sizes, imgUrl: "", notes: ""
      });
    }
  }
  return result;
}

/* ── AoS Battle Profiles parser ──
   Pages have structured table data. pdf.js gives us individual text items with positions.
   Strategy: group items by Y position into rows, identify faction from page headers,
   then look for rows that match [UnitName, number, number, ...] patterns typical of the
   HEROES and UNITS tables (which have columns: Name, Unit Size, Points, ..., Base Size). */
const AOS_FACTIONS = [
  "Cities of Sigmar","Daughters of Khaine","Fyreslayers","Idoneth Deepkin",
  "Kharadron Overlords","Lumineth Realm-lords","Seraphon","Stormcast Eternals",
  "Sylvaneth","Blades of Khorne","Disciples of Tzeentch","Hedonites of Slaanesh",
  "Helsmiths of Hashut","Maggotkin of Nurgle","Skaven","Slaves to Darkness",
  "Flesh-eater Courts","Nighthaunt","Ossiarch Bonereapers","Soulblight Gravelords",
  "Gloomspite Gitz","Ironjawz","Kruleboyz","Ogor Mawtribes","Sons of Behemat"
];

async function parseAoSPDF(pdf) {
  const result = [];
  let currentFaction = "";
  /* Track which unit names we've already seen per faction to merge sizes */
  const seen = {};  /* "faction::name" -> index in result */

  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const tc = await page.getTextContent();
    const items = tc.items.filter(it => it.str.trim());

    /* Check for faction name in the page text */
    const pageText = items.map(it => it.str.trim()).join(" ");
    for (const fac of AOS_FACTIONS) {
      /* Faction names appear as large headers — match by uppercase or exact */
      if (pageText.toUpperCase().includes(fac.toUpperCase())) {
        /* Only switch if it's in the upper area of the page (header zone) */
        const facItems = items.filter(it => it.str.trim().toUpperCase().includes(fac.toUpperCase()));
        if (facItems.some(it => it.transform[5] > 600)) { /* high Y = near top */
          currentFaction = fac;
          break;
        }
      }
    }
    if (!currentFaction) continue;

    /* Group items into rows by Y coordinate */
    const sorted = items
      .map(it => ({ str: it.str.trim(), x: it.transform[4], y: Math.round(it.transform[5]) }))
      .sort((a, b) => b.y - a.y || a.x - b.x);

    const rows = [];
    let curY = sorted[0]?.y;
    let curRow = [];
    for (const it of sorted) {
      if (Math.abs(it.y - curY) > 4) {
        if (curRow.length) rows.push(curRow.sort((a,b) => a.x - b.x));
        curRow = [];
        curY = it.y;
      }
      curRow.push(it);
    }
    if (curRow.length) rows.push(curRow.sort((a,b) => a.x - b.x));

    /* Identify table columns: look for header rows (HEROES/UNITS, UNIT SIZE, POINTS, BASE SIZE).
       Once we find column X positions from header, parse subsequent rows until next header. */
    let colMode = null;    /* "heroes" or "units" or null */
    let colXRanges = null; /* { name, size, points, base } x-positions */

    for (const row of rows) {
      const text = row.map(it => it.str).join(" ");

      /* Skip non-unit tables: Battle Formation, Heroic Trait, Artefact, Spell Lore, etc */
      if (/^TYPE\b/i.test(text) || /Battle Formation|Heroic Trait|Artefact|Spell Lore|Prayer Lore|Manifestation/i.test(text)) {
        colMode = null;
        continue;
      }
      /* Skip section headers */
      if (/^(UNIVERSAL|REGIMENTS? OF RENOWN|WARHAMMER LEGENDS)/i.test(text)) {
        colMode = null;
        continue;
      }

      /* Detect HEROES / UNITS header rows */
      if (row.some(it => /^HEROES$/i.test(it.str)) && row.some(it => /^UNIT SIZE$/i.test(it.str))) {
        colMode = "heroes";
        const nameItem = row.find(it => /^HEROES$/i.test(it.str));
        const sizeItem = row.find(it => /^UNIT SIZE$/i.test(it.str));
        const ptsItem = row.find(it => /^POINTS$/i.test(it.str));
        const baseItem = row.find(it => /^BASE SIZE$/i.test(it.str));
        colXRanges = {
          nameX: nameItem?.x || 0,
          sizeX: sizeItem?.x || 200,
          ptsX: ptsItem?.x || 300,
          baseX: baseItem?.x || 500
        };
        continue;
      }
      if (row.some(it => /^UNITS$/i.test(it.str)) && row.some(it => /^UNIT SIZE$/i.test(it.str))) {
        colMode = "units";
        const nameItem = row.find(it => /^UNITS$/i.test(it.str));
        const sizeItem = row.find(it => /^UNIT SIZE$/i.test(it.str));
        const ptsItem = row.find(it => /^POINTS$/i.test(it.str));
        const baseItem = row.find(it => /^BASE SIZE$/i.test(it.str));
        colXRanges = {
          nameX: nameItem?.x || 0,
          sizeX: sizeItem?.x || 200,
          ptsX: ptsItem?.x || 300,
          baseX: baseItem?.x || 500
        };
        continue;
      }

      if (!colMode || !colXRanges) continue;

      /* Parse a data row: find items closest to each column X position */
      const closest = (targetX) => {
        let best = null, bestDist = Infinity;
        for (const it of row) {
          const d = Math.abs(it.x - targetX);
          if (d < bestDist) { bestDist = d; best = it; }
        }
        return best;
      };

      /* Name is leftmost item(s), size is near sizeX, points near ptsX, base near baseX */
      const nameItems = row.filter(it => it.x < colXRanges.sizeX - 10);
      const sizeItem = closest(colXRanges.sizeX);
      const ptsItem = closest(colXRanges.ptsX);
      const baseItem = closest(colXRanges.baseX);

      const unitName = nameItems.map(it => it.str).join(" ").replace(/^[✹●]\s*/, "").trim();
      if (!unitName || /^(HEROES|UNITS|TYPE|UNIT SIZE|POINTS|RELEVANT|REGIMENT|NOTES|BASE SIZE)$/i.test(unitName)) continue;

      const unitSize = parseInt(sizeItem?.str) || 0;
      /* Points can be "150 (-10)" — strip the change marker */
      const rawPts = ptsItem?.str || "0";
      const points = parseInt(rawPts.replace(/\s*\([+-]?\d+\)\s*/, "")) || 0;
      /* Base size */
      const base = (baseItem && baseItem.x > colXRanges.ptsX + 20) ? baseItem.str.trim() : "";

      if (unitSize === 0 && points === 0) continue;

      const key = currentFaction + "::" + unitName;
      if (seen[key] !== undefined) {
        /* Same unit with a different size option — add to existing sizes */
        result[seen[key]].sizes.push({ m: unitSize, p: points });
      } else {
        seen[key] = result.length;
        result.push({
          id: uid(), name: unitName, faction: currentFaction, game: "Age of Sigmar",
          cat: colMode === "heroes" ? "character" : "unit",
          base, sizes: [{ m: unitSize, p: points }], imgUrl: "", notes: ""
        });
      }
    }
  }
  return result;
}

async function parsePDF(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;

  const firstPage = await pdf.getPage(1);
  const textContent = await firstPage.getTextContent();
  const firstPageText = textContent.items.map(i => i.str).join(" ").toUpperCase();

  if (firstPageText.includes("MUNITORUM FIELD MANUAL")) {
    return parse40kPDF(pdf);
  } else if (firstPageText.includes("BATTLE PROFILES")) {
    return parseAoSPDF(pdf);
  } else {
    throw new Error("Unknown PDF format. Expected Munitorum Field Manual or Battle Profiles.");
  }
}

// ── Spreadsheet Import ──
function parseSpreadsheet(data){
  const wb=XLSX.read(data,{type:"array"});
  const units=[];
  for(const name of wb.SheetNames){
    const sh=XLSX.utils.sheet_to_json(wb.Sheets[name],{defval:""});
    for(const row of sh){
      const n=row["Unit"]||row["Name"]||row["name"]||row["unit"]||"";
      if(!n.trim())continue;
      const fac=row["Faction"]||row["faction"]||name||"";
      const game=row["Game"]||row["game"]||"";
      const cat=row["Cat"]||row["Category"]||row["cat"]||"unit";
      const base=row["Base"]||row["base"]||row["Base Size"]||"";
      const img=row["Image"]||row["image"]||row["imgUrl"]||row["Image URL"]||"";
      const sizes=[];
      if(row["Models"]!==undefined&&row["Pts"]!==undefined){
        sizes.push({m:parseInt(row["Models"])||1,p:parseInt(row["Pts"])||0});
      }
      for(let i=1;i<=6;i++){
        const m=row["M"+i]||row["Models"+i];
        const p=row["P"+i]||row["Pts"+i]||row["Points"+i];
        if(m!==undefined&&p!==undefined&&(parseInt(m)||parseInt(p))){
          sizes.push({m:parseInt(m)||1,p:parseInt(p)||0});
        }
      }
      if(sizes.length===0)sizes.push({m:1,p:parseInt(row["Pts"]||row["Points"]||row["points"])||0});
      units.push({id:uid(),name:n.trim(),faction:fac.trim(),game:game.trim(),cat:cat.toLowerCase().trim(),base:String(base).trim(),sizes,imgUrl:img.trim(),notes:""});
    }
  }
  return units;
}

// ── Export ──
function exportJSON(units){
  const d={version:1,exportedAt:new Date().toISOString(),tool:"Forge Admin",units};
  const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
  const u=URL.createObjectURL(b);
  const a=document.createElement("a");
  a.href=u;a.download="hdl-unit-database-"+new Date().toISOString().slice(0,10)+".json";
  a.click();URL.revokeObjectURL(u);
}

function exportExcel(units,factions){
  const wb=XLSX.utils.book_new();
  for(const fac of factions){
    const facUnits=units.filter(u=>u.faction===fac);
    if(!facUnits.length)continue;
    const maxSz=Math.max(...facUnits.map(u=>u.sizes.length),1);
    const hdr=["Unit","Cat","Base"];
    for(let i=0;i<maxSz;i++){hdr.push("M"+(i+1));hdr.push("P"+(i+1));}
    hdr.push("Image URL");
    const rows=[hdr];
    for(const u of facUnits){
      const r=[u.name,u.cat,u.base];
      for(let i=0;i<maxSz;i++){r.push(u.sizes[i]?.m||"");r.push(u.sizes[i]?.p||"");}
      r.push(u.imgUrl||"");
      rows.push(r);
    }
    const sh=XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb,sh,fac.substring(0,31).replace(/[\\\/\?\*\[\]]/g,""));
  }
  XLSX.writeFile(wb,"HDL_Unit_Database.xlsx");
}

function Toast({msg,type,onDone}){

function ImgCell({url,onClick}){

function LoginScreen(){

  const [pass,setPass]=useState("");

    try{await auth.signInWithEmailAndPassword(email,pass);}

// ── Import Modal ──
function ImportModal({onImport,onClose}){
  const [drag,setDrag]=useState(false);
  const fileRef=useRef(null);
  const handleFile=file=>{
    const reader=new FileReader();
    if(file.name.endsWith(".json")){
      reader.onload=e=>{
        try{const d=JSON.parse(e.target.result);const units=Array.isArray(d)?d:(d.units||d.models||[]);onImport(units.map(u=>({...u,id:u.id||uid()})));}
        catch{alert("Invalid JSON");}
      };
      reader.readAsText(file);
    } else {
      reader.onload=e=>{
        try{const data=new Uint8Array(e.target.result);onImport(parseSpreadsheet(data));}
        catch(err){alert("Failed to parse: "+err.message);}
      };
      reader.readAsArrayBuffer(file);
    }
  };
  const onDrop=e=>{e.preventDefault();setDrag(false);if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);};

  return <div className="modal-overlay" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h2>Import Data</h2>
      <div className={"dropzone"+(drag?" dragover":"")}
        onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={()=>setDrag(false)}
        onDrop={onDrop}
        onClick={()=>fileRef.current?.click()}>
        <div className="dropzone-icon">📂</div>
        <div className="dropzone-text">Drop file here or click to browse</div>
        <div className="dropzone-sub">Supports .xlsx, .csv, .json</div>
      </div>
      <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv,.json" hidden onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);}}/>
      <div style={{marginTop:16,fontSize:".8rem",color:"var(--tx4)",lineHeight:1.5}}>
        <strong style={{color:"var(--tx3)"}}>Expected columns:</strong> Unit/Name, Faction, Game, Cat, Base, Models, Pts (or M1/P1, M2/P2 for multiple sizes), Image URL
      </div>
      <div className="modal-actions">
        <button className="btn" onClick={onClose}>Cancel</button>
      </div>
    </div>
  </div>;
}

// ── Parse PDF Modal ──
function ParsePDFModal({onImport,onClose,onToast}){
  const [drag,setDrag]=useState(false);
  const [parsing,setParsing]=useState(false);
  const [summary,setSummary]=useState(null);
  const fileRef=useRef(null);

  const handleFile=async(file)=>{
    setParsing(true);
    setSummary(null);
    try{
      const units=await parsePDF(file);
      const factions=[...new Set(units.map(u=>u.faction))];
      setSummary({units:units.length,factions:factions.length,data:units});
      onToast(`Found ${units.length} units across ${factions.length} factions`,"success");
    }catch(err){
      onToast("PDF parsing failed: "+err.message,"error");
    }
    setParsing(false);
  };

  const onDrop=e=>{e.preventDefault();setDrag(false);if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);};

  return <div className="modal-overlay" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h2>Parse PDF</h2>
      {!summary?
        <>
          <div className={"dropzone"+(drag?" dragover":"")}
            onDragOver={e=>{e.preventDefault();setDrag(true);}}
            onDragLeave={()=>setDrag(false)}
            onDrop={onDrop}
            onClick={()=>fileRef.current?.click()}
            style={{opacity:parsing?0.5:1,pointerEvents:parsing?"none":"auto"}}>
            <div className="dropzone-icon">{parsing?"⏳":"📄"}</div>
            <div className="dropzone-text">{parsing?"Parsing PDF…":"Drop PDF here or click"}</div>
            <div className="dropzone-sub">Supports Munitorum Field Manual (40K) or Battle Profiles (AoS)</div>
          </div>
          <input ref={fileRef} type="file" accept=".pdf" hidden onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);}}/>
          <div className="modal-actions">
            <button className="btn" onClick={onClose} disabled={parsing}>Cancel</button>
          </div>
        </>
      :
        <>
          <p style={{color:"var(--green)",textAlign:"center",marginBottom:16}}>
            Found <strong>{summary.units}</strong> units across <strong>{summary.factions}</strong> factions
          </p>
          <div className="modal-actions">
            <button className="btn" onClick={onClose}>Cancel</button>
            <button className="btn btn-gold" onClick={()=>{onImport(summary.data);onClose();}}>Import Units</button>
          </div>
        </>
      }
    </div>
  </div>;
}

// ── Publish to Firebase ──
function PublishModal({units,onClose,onToast}){
  const [status,setStatus]=useState("ready");
  const [progress,setProgress]=useState(0);
  const [detail,setDetail]=useState("");

  const handlePublish=async()=>{
    setStatus("publishing");setProgress(0);setDetail("Preparing data…");
    try{
      const byFaction={};
      for(const u of units){
        const f=u.faction||"Uncategorised";
        if(!byFaction[f])byFaction[f]=[];
        byFaction[f].push({name:u.name,faction:u.faction,game:u.game,cat:u.cat,base:u.base,sizes:u.sizes,imgUrl:u.imgUrl||"",notes:u.notes||""});
      }
      const factions=Object.keys(byFaction);
      let done=0;

      await fsdb.collection("unitDatabase").doc("_meta").set({
        lastUpdated:firebase.firestore.FieldValue.serverTimestamp(),
        totalUnits:units.length,
        factions:factions,
        games:[...new Set(units.map(u=>u.game).filter(Boolean))]
      });

      for(const fac of factions){
        setDetail("Publishing "+fac+"…");
        await fsdb.collection("unitDatabase").doc(fac).set({
          faction:fac,
          game:byFaction[fac][0]?.game||"",
          units:byFaction[fac],
          unitCount:byFaction[fac].length
        });
        done++;
        setProgress(Math.round((done/factions.length)*100));
      }

      setStatus("done");
      setDetail("Published "+units.length+" units across "+factions.length+" factions");
      onToast("Published to Firebase!","success");
    }catch(e){
      setStatus("error");
      setDetail("Error: "+e.message);
      onToast("Publish failed: "+e.message,"error");
    }
  };

  return <div className="modal-overlay" onClick={status==="publishing"?undefined:onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h2>Publish to Firebase</h2>
      {status==="ready"&&<>
        <p style={{color:"var(--tx2)",lineHeight:1.5,marginBottom:12}}>
          This will push <strong style={{color:"var(--gold)"}}>{units.length} units</strong> to Firebase, updating the live database for all Hobby Debt Ledger users.
        </p>
        <p style={{color:"var(--amber)",fontSize:".82rem",lineHeight:1.5}}>⚠ This overwrites the existing live database.</p>
        <div className="modal-actions">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-gold" onClick={handlePublish}>🔥 Publish Now</button>
        </div>
      </>}
      {status==="publishing"&&<>
        <div className="publish-progress"><div className="publish-bar" style={{width:progress+"%"}}/><div className="publish-label">{progress}%</div></div>
        <p style={{color:"var(--tx3)",fontSize:".82rem",marginTop:8,textAlign:"center"}}>{detail}</p>
      </>}
      {(status==="done"||status==="error")&&<>
        <p style={{color:status==="done"?"var(--green)":"var(--red)",fontSize:".88rem",lineHeight:1.5,textAlign:"center",marginBottom:12}}>
          {status==="done"?"✓ ":"✕ "}{detail}
        </p>
        <div className="modal-actions"><button className="btn btn-gold" onClick={onClose}>Done</button></div>
      </>}
    </div>
  </div>;
}

// ── Pull from Firebase ──
function PullModal({onPull,onClose,onToast}){
  const [loading,setLoading]=useState(false);

  const handlePull=async()=>{
    setLoading(true);
    try{
      const meta=await fsdb.collection("unitDatabase").doc("_meta").get();
      if(!meta.exists){onToast("No data found in Firebase","error");setLoading(false);return;}
      const factions=meta.data().factions||[];
      const allUnits=[];
      for(const fac of factions){
        const doc=await fsdb.collection("unitDatabase").doc(fac).get();
        if(doc.exists){allUnits.push(...(doc.data().units||[]).map(u=>({...u,id:uid()})));}
      }
      onPull(allUnits);
      onToast("Pulled "+allUnits.length+" units from Firebase","success");
      onClose();
    }catch(e){onToast("Pull failed: "+e.message,"error");}
    setLoading(false);
  };

  return <div className="modal-overlay" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <h2>Pull from Firebase</h2>
      <p style={{color:"var(--tx2)",lineHeight:1.5,marginBottom:12}}>
        Download the current live database from Firebase. This will <strong style={{color:"var(--amber)"}}>replace</strong> your local data.
      </p>
      <div className="modal-actions">
        <button className="btn" onClick={onClose}>Cancel</button>
        <button className="btn btn-gold" onClick={handlePull} disabled={loading}>{loading?"Pulling…":"Pull Data"}</button>
      </div>
    </div>
  </div>;
}

// ── Main App ──
function App(){
  const [user,setUser]=useState(undefined);
  const [units,setUnits]=useState(()=>{try{return JSON.parse(localStorage.getItem("forge-units"))||[];}catch{return[];}});
  const [gameFilter,setGameFilter]=useState("");
  const [facFilter,setFacFilter]=useState("");
  const [catFilter,setCatFilter]=useState("");
  const [search,setSearch]=useState("");
  const [flagFilter,setFlagFilter]=useState("");
  const [sortCol,setSortCol]=useState("name");
  const [sortAsc,setSortAsc]=useState(true);
  const [editing,setEditing]=useState(null);
  const [showImport,setShowImport]=useState(false);
  const [showParsePDF,setShowParsePDF]=useState(false);
  const [showPublish,setShowPublish]=useState(false);
  const [showPull,setShowPull]=useState(false);
  const [toast,setToast]=useState(null);
  const [fetchingAllImages,setFetchingAllImages]=useState(false);

  useEffect(()=>{const unsub=auth.onAuthStateChanged(u=>setUser(u||null));return unsub;},[]);
  useEffect(()=>{localStorage.setItem("forge-units",JSON.stringify(units));},[units]);

  const showToast=(msg,type)=>setToast({msg,type});

  const allFactions=useMemo(()=>[...new Set(units.map(u=>u.faction).filter(Boolean))].sort(),[units]);
  const allGames=useMemo(()=>[...new Set(units.map(u=>u.game).filter(Boolean))].sort(),[units]);

  const flaggedUnits=useMemo(()=>units.map(u=>{
    let flag="ok";
    if(!u.imgUrl)flag="missing";
    if(!u.name||!u.faction||u.sizes.some(s=>!s.p))flag="error";
    return {...u,_flag:flag};
  }),[units]);

  const filtered=useMemo(()=>{
    let f=flaggedUnits;
    if(gameFilter)f=f.filter(u=>u.game===gameFilter);
    if(facFilter)f=f.filter(u=>u.faction===facFilter);
    if(catFilter)f=f.filter(u=>u.cat===catFilter);
    if(flagFilter==="missing")f=f.filter(u=>u._flag==="missing");
    if(flagFilter==="error")f=f.filter(u=>u._flag==="error");
    if(flagFilter==="ok")f=f.filter(u=>u._flag==="ok");
    if(search){const q=search.toLowerCase();f=f.filter(u=>u.name.toLowerCase().includes(q)||u.faction.toLowerCase().includes(q));}
    f.sort((a,b)=>{
      let va=a[sortCol]||"",vb=b[sortCol]||"";
      if(sortCol==="sizes"){va=(a.sizes[0]?.p||0);vb=(b.sizes[0]?.p||0);}
      if(typeof va==="number"&&typeof vb==="number")return sortAsc?va-vb:vb-va;
      return sortAsc?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
    });
    return f;
  },[flaggedUnits,gameFilter,facFilter,catFilter,flagFilter,search,sortCol,sortAsc]);

  const toggleSort=col=>{if(sortCol===col)setSortAsc(!sortAsc);else{setSortCol(col);setSortAsc(true);}};
  const SortArrow=({col})=><span className="sort-arrow">{sortCol===col?(sortAsc?"▲":"▼"):"△"}</span>;

  const saveUnit=u=>{
    if(units.find(x=>x.id===u.id)){setUnits(units.map(x=>x.id===u.id?u:x));}
    else{setUnits([...units,u]);}
    setEditing(null);showToast("Unit saved","success");
  };
  const deleteUnit=id=>{setUnits(units.filter(u=>u.id!==id));showToast("Unit deleted","");};
  const addUnit=()=>setEditing(emptyUnit(facFilter||"",gameFilter||""));

  const handleImport=imported=>{
    const merged=[...units];let added=0,updated=0;
    for(const u of imported){
      const existing=merged.findIndex(x=>x.name.toLowerCase()===u.name.toLowerCase()&&x.faction.toLowerCase()===u.faction.toLowerCase());
      if(existing>=0){merged[existing]={...merged[existing],...u,id:merged[existing].id};updated++;}
      else{merged.push({...u,id:uid()});added++;}
    }
    setUnits(merged);setShowImport(false);setShowParsePDF(false);
    showToast(`Imported: ${added} added, ${updated} updated`,"success");
  };

  const handlePull=pulled=>{setUnits(pulled);};

  const handleAutoFetchImages=async()=>{
    setFetchingAllImages(true);
    const noImg=units.filter(u=>!u.imgUrl);
    let updated=0;
    const updates={};
    for(const u of noImg){
      try{
        const url=await fetchUnitImage(u.name,u.game);
        if(url){updates[u.id]=url;updated++;}
      }catch(e){}
    }
    setUnits(prev=>prev.map(u=>updates[u.id]?{...u,imgUrl:updates[u.id]}:u));
    setFetchingAllImages(false);
    showToast(`Updated ${updated}/${noImg.length} images`,"success");
  };

  const stats=useMemo(()=>{
    const missing=flaggedUnits.filter(u=>u._flag==="missing").length;
    const errors=flaggedUnits.filter(u=>u._flag==="error").length;
    return {total:units.length,factions:allFactions.length,missing,errors};
  },[units,flaggedUnits,allFactions]);

  const facOptions=useMemo(()=>{
    if(!gameFilter)return allFactions;
    return [...new Set(units.filter(u=>u.game===gameFilter).map(u=>u.faction).filter(Boolean))].sort();
  },[units,gameFilter,allFactions]);

  if(user===undefined)return <div className="login-wrap"><div style={{color:"var(--tx4)",fontFamily:"var(--fd)",letterSpacing:".12em"}}>Loading…</div></div>;
  if(!user)return <LoginScreen/>;

  return <div className="app">
    <div className="hdr">
      <div><div className="logo">⚒ FORGE</div><div className="logo-sub">Hobby Debt Ledger — Admin</div></div>
      <div className="hdr-sep"/>
      <div className="hdr-stats">
        <div className="hstat"><span className="n">{stats.total}</span><span className="l">Units</span></div>
        <div className="hstat"><span className="n">{stats.factions}</span><span className="l">Factions</span></div>
        <div className="hstat"><span className="n" style={{color:stats.missing?"var(--amber)":"var(--green)"}}>{stats.missing}</span><span className="l">No Image</span></div>
        <div className="hstat"><span className="n" style={{color:stats.errors?"var(--red)":"var(--green)"}}>{stats.errors}</span><span className="l">Errors</span></div>
      </div>
      <div className="hdr-actions">
        <button className="btn" onClick={()=>setShowPull(true)}>⬇ Pull</button>
        <button className="btn" onClick={()=>setShowImport(true)}>📂 Import</button>
        <button className="btn" onClick={()=>setShowParsePDF(true)}>📄 Parse PDF</button>
        <button className="btn" onClick={handleAutoFetchImages} disabled={fetchingAllImages}>🔍 Images</button>
        <button className="btn" onClick={()=>exportJSON(units)}>💾 JSON</button>
        <button className="btn" onClick={()=>exportExcel(units,allFactions)}>📊 Excel</button>
        <button className="btn btn-gold" onClick={()=>setShowPublish(true)}>🔥 Publish</button>
        <div className="hdr-sep"/>
        <span className="hdr-user">{user.email}</span>
        <button className="btn btn-sm btn-red" onClick={()=>auth.signOut()}>Out</button>
      </div>
    </div>

    <div className="toolbar">
      <div className="tb-group">
        <span className="tb-label">Game</span>
        <select className="tb-sel" value={gameFilter} onChange={e=>{setGameFilter(e.target.value);setFacFilter("");}}>
          <option value="">All Games</option>
          {allGames.map(g=><option key={g}>{g}</option>)}
        </select>
      </div>
      <div className="tb-group">
        <span className="tb-label">Faction</span>
        <select className="tb-sel" value={facFilter} onChange={e=>setFacFilter(e.target.value)}>
          <option value="">All Factions</option>
          {facOptions.map(f=><option key={f}>{f}</option>)}
        </select>
      </div>
      <div className="tb-group">
        <span className="tb-label">Category</span>
        <select className="tb-sel" value={catFilter} onChange={e=>setCatFilter(e.target.value)}>
          <option value="">All</option>
          {CATS.map(c=><option key={c}>{c}</option>)}
        </select>
      </div>
      <div className="tb-sep"/>
      <div className="tb-group">
        <span className="tb-label">Status</span>
        <select className="tb-sel" value={flagFilter} onChange={e=>setFlagFilter(e.target.value)}>
          <option value="">All</option>
          <option value="ok">✓ Complete</option>
          <option value="missing">⚠ Missing Image</option>
          <option value="error">✕ Has Errors</option>
        </select>
      </div>
      <div className="tb-sep"/>
      <input className="tb-search" placeholder="Search units…" value={search} onChange={e=>setSearch(e.target.value)}/>
      <span className="tb-count">{filtered.length} shown</span>
      <div className="tb-spacer"/>
      <button className="btn btn-green btn-sm" onClick={addUnit}>+ Add Unit</button>
    </div>

    {units.length===0?
      <div className="empty">
        <div className="empty-icon">⚒</div>
        <div className="empty-title">No Units Yet</div>
        <div className="empty-text">Import a spreadsheet, JSON, or PDF, or pull existing data from Firebase.</div>
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button className="btn" onClick={()=>setShowPull(true)}>⬇ Pull from Firebase</button>
          <button className="btn" onClick={()=>setShowImport(true)}>📂 Import File</button>
          <button className="btn btn-gold" onClick={()=>setShowParsePDF(true)}>📄 Parse PDF</button>
        </div>
      </div>
    :
      <div className="table-wrap">
        <table>
          <thead><tr>
            <th className="col-flag" onClick={()=>toggleSort("_flag")}>⬤<SortArrow col="_flag"/></th>
            <th className={"col-name"+(sortCol==="name"?" active":"")} onClick={()=>toggleSort("name")}>Unit<SortArrow col="name"/></th>
            <th className={"col-faction"+(sortCol==="faction"?" active":"")} onClick={()=>toggleSort("faction")}>Faction<SortArrow col="faction"/></th>
            <th className={"col-game"+(sortCol==="game"?" active":"")} onClick={()=>toggleSort("game")}>Game<SortArrow col="game"/></th>
            <th className={"col-cat"+(sortCol==="cat"?" active":"")} onClick={()=>toggleSort("cat")}>Cat<SortArrow col="cat"/></th>
            <th className={"col-base"+(sortCol==="base"?" active":"")} onClick={()=>toggleSort("base")}>Base<SortArrow col="base"/></th>
            <th className={"col-sizes"+(sortCol==="sizes"?" active":"")} onClick={()=>toggleSort("sizes")}>Sizes (M×Pts)<SortArrow col="sizes"/></th>
            <th className="col-img">Image</th>
            <th className="col-actions"></th>
          </tr></thead>
          <tbody>
            {filtered.map(u=><tr key={u.id} className={u._flag==="error"?"flagged":""}>
              <td className="col-flag"><span className={"flag-dot "+u._flag}/></td>
              <td className="col-name" style={{fontWeight:600}}>{u.name||<span style={{color:"var(--red)",fontStyle:"italic"}}>unnamed</span>}</td>
              <td className="col-faction" style={{color:"var(--tx3)"}}>{u.faction}</td>
              <td className="col-game mono" style={{fontSize:".68rem"}}>{u.game}</td>
              <td className="col-cat mono">{u.cat}</td>
              <td className="col-base mono">{u.base}</td>
              <td className="col-sizes"><div className="sizes-chips">{u.sizes.map((sz,i)=><span key={i} className="sz-chip">{sz.m}×{sz.p}pts</span>)}</div></td>
              <td className="col-img">
                <ImgCell url={u.imgUrl} onClick={()=>setEditing(u)}/>
                {u.imgUrl&&<span className="img-url">{u.imgUrl.replace(/^https?:\/\//,"").slice(0,30)}…</span>}
              </td>
              <td className="col-actions">
                <button className="btn btn-sm" onClick={()=>setEditing(u)}>✎</button>
                {" "}
                <button className="btn btn-sm btn-red" onClick={()=>{if(confirm("Delete "+u.name+"?"))deleteUnit(u.id);}}>✕</button>
              </td>
            </tr>)}
          </tbody>
        </table>
      </div>
    }

    <div className="status-bar">
      <span><span className="dot g"/> {stats.total-stats.missing-stats.errors} complete</span>
      <span><span className="dot a"/> {stats.missing} missing images</span>
      <span><span className="dot r"/> {stats.errors} errors</span>
      <span style={{marginLeft:"auto"}}>🔥 Firebase connected • {user.email}</span>
    </div>

    {editing&&<UnitModal unit={editing} onSave={saveUnit} onClose={()=>setEditing(null)} allFactions={allFactions} onToast={showToast}/>}
    {showImport&&<ImportModal onImport={handleImport} onClose={()=>setShowImport(false)}/>}
    {showParsePDF&&<ParsePDFModal onImport={handleImport} onClose={()=>setShowParsePDF(false)} onToast={showToast}/>}
    {showPublish&&<PublishModal units={units} onClose={()=>setShowPublish(false)} onToast={showToast}/>}
    {showPull&&<PullModal onPull={handlePull} onClose={()=>setShowPull(false)} onToast={showToast}/>}
    {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw-forge.js').catch(e=>console.warn('SW reg failed:',e));
  });
}
</script>
</body>
