<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>⚔ Hobby Debt Ledger — Warhammer Collection Tracker</title>
<link rel="manifest" href="hdl-manifest.json"/>
<meta name="theme-color" content="#1e2235"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="HDL"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg0:#f0f2f7;--bg1:#1e2235;--bg2:#ffffff;--bg3:#f8f9fc;--bg4:#eef0f6;
  --br1:#e2e8f0;--br2:#cbd5e1;--br3:#94a3b8;
  --tx1:#0f172a;--tx2:#334155;--tx3:#64748b;--tx4:#94a3b8;
  --acc:#6366f1;--acc2:#4f46e5;--accbg:#eef2ff;--accbdr:#a5b4fc;
  --gold:#6366f1;--gold2:#4f46e5;--goldbg:#eef2ff;
  --amber:#d97706;--amberbg:#fffbeb;
  --red:#dc2626;--reddim:#f87171;--green:#16a34a;--greendim:#86efac;
  --hdr:#1e2235;--hdrtx:#f8fafc;--sidebar:#252b42;
  --fd:'Inter',sans-serif;--fb:'Inter',sans-serif;--r:8px;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  --shadow2:0 4px 16px rgba(15,23,42,.10),0 2px 4px rgba(15,23,42,.06);
  --shadow3:0 10px 40px rgba(15,23,42,.15),0 4px 8px rgba(15,23,42,.08);
  /* ── STAGE COLOURS (single source of truth) ── */
  --sc-unbuilt:#94a3b8;--sc-built:#60a5fa;--sc-primed:#dde3ed;--sc-painted:#fb923c;--sc-detailed:#4ade80;
  --sc-bare:#94a3b8;
}
html,body,#root{height:100%;overflow:hidden;}
body{background:var(--bg0);color:var(--tx1);font-family:var(--fb);font-size:15px;}
@keyframes pulse{0%,100%{opacity:.4;}50%{opacity:1;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.spin{display:inline-block;animation:spin .9s linear infinite;}
.app{display:flex;flex-direction:column;height:100vh;}
.hdr{background:var(--hdr);border-bottom:1px solid rgba(255,255,255,.08);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;min-height:54px;flex-shrink:0;gap:10px;flex-wrap:wrap;}
.logo-title{font-family:var(--fd);font-size:1rem;font-weight:700;letter-spacing:.02em;color:#f8fafc;}
.logo-sub{font-size:.68rem;font-weight:400;letter-spacing:.04em;color:rgba(248,250,252,.4);margin-top:1px;}
.hdr-stats{display:flex;align-items:center;gap:12px;}
.stat .n{font-size:.92rem;font-weight:700;color:#f8fafc;display:block;line-height:1;text-align:center;}
.stat .l{font-size:.6rem;font-weight:500;letter-spacing:.04em;color:rgba(248,250,252,.4);text-transform:uppercase;}
.vdiv{width:1px;height:18px;background:rgba(255,255,255,.12);}
.main{display:flex;flex:1;min-height:0;}
.sidebar{width:210px;min-width:210px;background:var(--sidebar);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);}
.sb-label{font-size:.65rem;font-weight:600;letter-spacing:.06em;color:rgba(248,250,252,.35);text-transform:uppercase;padding:14px 14px 5px;}
.sb-game{font-size:.62rem;font-weight:600;letter-spacing:.06em;color:rgba(248,250,252,.25);text-transform:uppercase;padding:12px 14px 4px;border-top:1px solid rgba(255,255,255,.06);margin-top:4px;}
.sb-btn{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;padding:7px 14px;cursor:pointer;color:rgba(248,250,252,.6);font-family:var(--fb);font-size:.83rem;font-weight:400;text-align:left;transition:all .15s;position:relative;}
.sb-btn:hover{background:rgba(255,255,255,.06);color:rgba(248,250,252,.9);}
.sb-btn.active{background:rgba(99,102,241,.15);color:#f8fafc;font-weight:500;}
.sb-btn.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;background:var(--acc);border-radius:0 3px 3px 0;}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.15);}
.sb-ct{margin-left:auto;font-size:.65rem;color:rgba(248,250,252,.3);font-weight:500;}
.sb-div{height:1px;background:rgba(255,255,255,.06);margin:5px 10px;}
.sb-act{display:flex;align-items:center;gap:7px;width:100%;background:none;border:none;padding:8px 14px;cursor:pointer;color:rgba(248,250,252,.4);font-family:var(--fb);font-size:.75rem;font-weight:500;text-align:left;transition:all .15s;}
.sb-act:hover{background:rgba(255,255,255,.06);color:rgba(248,250,252,.8);}
.content{flex:1;display:flex;flex-direction:column;min-width:0;}
.toolbar{padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--br1);background:#ffffff;flex-shrink:0;flex-wrap:wrap;}
.tb-title{font-size:.82rem;font-weight:600;color:var(--tx1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:60px;}
.srch{background:var(--bg3);border:1px solid var(--br1);border-radius:var(--r);padding:6px 11px;color:var(--tx1);font-family:var(--fb);font-size:.82rem;font-weight:400;outline:none;width:160px;flex-shrink:0;transition:border-color .15s;}
.srch:focus{border-color:var(--acc);background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.1);}.srch::placeholder{color:var(--tx4);}
.stg-sel{background:var(--bg3);border:1px solid var(--br1);border-radius:var(--r);padding:6px 8px;color:var(--tx2);font-family:var(--fb);font-size:.82rem;outline:none;cursor:pointer;flex-shrink:0;transition:border-color .15s;}
.stg-sel:focus{border-color:var(--acc);}
.stg-sel option,.stg-sel optgroup{background:var(--bg2);}
.tb-btn{font-family:var(--fb);font-size:.78rem;font-weight:500;padding:6px 14px;border-radius:var(--r);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.tb-add{background:var(--acc);border:1px solid var(--acc2);color:#fff;}.tb-add:hover{background:var(--acc2);box-shadow:0 2px 8px rgba(99,102,241,.3);}
.tb-imp{background:var(--bg3);border:1px solid var(--br1);color:var(--tx2);}.tb-imp:hover{border-color:var(--br3);background:var(--bg4);}
.grid{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;align-content:start;}
.grid::-webkit-scrollbar{width:5px;}.grid::-webkit-scrollbar-track{background:var(--bg0);}.grid::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px;}
.card{background:var(--bg2);border:1px solid var(--br1);border-radius:var(--r);transition:all .2s;cursor:pointer;box-shadow:var(--shadow);}
.card:hover{transform:translateY(-2px);border-color:var(--br2);box-shadow:var(--shadow2);}
.card-bar{height:3px;flex-shrink:0;}.card-body{padding:12px 14px 10px;}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.card-name{font-size:.88rem;font-weight:600;color:var(--tx1);line-height:1.3;}
.card-fac{font-size:.72rem;font-weight:400;color:var(--tx3);margin-top:2px;}
.cat-tag{margin-left:5px;font-size:.65rem;font-weight:500;color:var(--amber);}
.badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.badge{font-size:.68rem;font-weight:500;padding:2px 7px;border-radius:4px;border:1px solid;white-space:nowrap;}
.bq{color:var(--tx2);border-color:var(--br2);background:var(--bg3);}
.bp{color:var(--acc);border-color:var(--accbdr);background:var(--accbg);}
.bea{color:var(--tx4);border-color:var(--br1);background:var(--bg3);font-size:.62rem;}
.dot-section{margin:7px 0 5px;}
.dot-row{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.dot-label{font-size:.62rem;font-weight:600;color:var(--tx4);width:32px;text-align:right;flex-shrink:0;}
.dots{display:flex;gap:3px;flex-wrap:wrap;}
.dot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(0,0,0,.08);transition:all .15s;}
.dot-summary{font-size:.66rem;font-weight:400;color:var(--tx3);margin-top:3px;}
.complete-badge{display:inline-block;font-size:.65rem;font-weight:500;padding:1px 7px;border-radius:4px;background:rgba(22,163,74,.08);border:1px solid var(--greendim);color:var(--green);margin-left:6px;}
.card-foot{display:flex;gap:9px;font-size:.7rem;color:var(--tx3);padding-top:6px;border-top:1px solid var(--br1);margin-top:6px;}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--tx3);}
.empty-ico{font-size:2.4rem;margin-bottom:12px;}
.empty h3{font-size:.96rem;font-weight:600;color:var(--tx2);margin-bottom:6px;}
.empty p{font-size:.84rem;color:var(--tx3);}
.ov{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:300;padding:14px;backdrop-filter:blur(4px);}
.modal{background:var(--bg2);border:1px solid var(--br1);border-radius:12px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow3);}
.modal::-webkit-scrollbar{width:4px;}.modal::-webkit-scrollbar-thumb{background:var(--br2);}
.mhdr{padding:16px 20px 12px;border-bottom:1px solid var(--br1);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);}
.mtitle{font-size:.92rem;font-weight:600;color:var(--tx1);}
.mclose{background:none;border:1px solid var(--br1);color:var(--tx3);cursor:pointer;font-size:.85rem;padding:4px 8px;border-radius:6px;transition:all .15s;}.mclose:hover{color:var(--tx1);border-color:var(--br3);}
.mbody{padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.fg{display:flex;flex-direction:column;gap:4px;}.fg.full{grid-column:1/-1;}
.fl{font-size:.72rem;font-weight:600;color:var(--tx2);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.fl-hint{font-weight:400;font-style:italic;font-size:.7rem;color:var(--tx3);}
.fi,.fsel,.fta{background:var(--bg3);border:1px solid var(--br1);border-radius:var(--r);padding:8px 11px;color:var(--tx1);font-family:var(--fb);font-size:.86rem;outline:none;transition:all .15s;width:100%;}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--acc);background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.1);}
.fsel{cursor:pointer;}.fsel option,.fsel optgroup{background:var(--bg2);}
.fta{resize:vertical;min-height:50px;}
.ac-wrap{position:relative;}
.ac-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1px solid var(--br2);border-radius:var(--r);z-index:500;overflow:hidden;box-shadow:var(--shadow2);max-height:260px;overflow-y:auto;}
.ac-item{padding:9px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--br1);}
.ac-item:last-child{border-bottom:none;}.ac-item:hover,.ac-item.hi{background:var(--bg3);}
.ac-name{font-size:.8rem;font-weight:600;color:var(--acc);}
.ac-cat{display:inline-block;margin-left:6px;font-size:.65rem;font-weight:500;color:var(--tx3);background:var(--bg3);padding:1px 5px;border-radius:4px;border:1px solid var(--br1);}
.ac-sub{font-size:.7rem;color:var(--tx3);margin-top:2px;}
.unit-chip{background:var(--accbg);border:1px solid var(--accbdr);border-radius:var(--r);padding:9px 12px;display:flex;align-items:center;justify-content:space-between;}
.uc-name{font-size:.82rem;font-weight:600;color:var(--acc);}
.uc-sub{font-size:.68rem;color:var(--tx3);margin-top:2px;}
.uc-clr{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:.85rem;padding:0 4px;}.uc-clr:hover{color:var(--tx1);}
.size-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.sz{background:var(--bg3);border:1.5px solid var(--br1);border-radius:var(--r);padding:7px;cursor:pointer;transition:all .15s;text-align:center;}
.sz:hover{border-color:var(--br3);}.sz.sel{border-color:var(--acc);background:var(--accbg);box-shadow:0 0 0 2px rgba(99,102,241,.15);}
.sz-m{font-size:.65rem;font-weight:600;color:var(--tx3);text-transform:uppercase;}.sz-p{font-size:.82rem;font-weight:600;color:var(--tx1);}
.pm-section{background:var(--bg3);border:1px solid var(--br1);border-radius:var(--r);padding:10px;}
.pm-bulk{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px;}
.pm-bulk-btn{font-size:.7rem;font-weight:500;padding:3px 7px;border-radius:5px;cursor:pointer;border:1px solid var(--br1);background:var(--bg2);color:var(--tx2);transition:all .12s;}
.pm-bulk-btn:hover{border-color:var(--acc);color:var(--acc);}
.pm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:4px;margin:8px 0;}
.pm-cell{background:var(--bg2);border:1px solid var(--br1);border-radius:6px;padding:3px 2px;text-align:center;transition:all .12s;}
.pm-cell:hover{border-color:var(--br3);box-shadow:var(--shadow);}
.pm-num{font-size:.6rem;font-weight:600;color:var(--tx4);margin-bottom:2px;}
.pm-dots{display:flex;justify-content:center;gap:3px;}
.pm-dot{width:15px;height:15px;border-radius:50%;border:1.5px solid rgba(0,0,0,.08);cursor:pointer;transition:all .1s;}
.pm-dot:hover{transform:scale(1.3);box-shadow:0 0 6px rgba(0,0,0,.15);}
.pm-dot:active{transform:scale(1.5);}
.pm-legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;padding-top:6px;border-top:1px solid var(--br1);}
.pm-leg-item{display:flex;align-items:center;gap:3px;font-size:.64rem;color:var(--tx3);}
.pm-leg-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(0,0,0,.08);}
.pm-leg-sep{font-size:.58rem;font-weight:600;color:var(--tx4);text-transform:uppercase;margin:0 2px;}
.mftr{padding:12px 20px;border-top:1px solid var(--br1);display:flex;gap:8px;justify-content:flex-end;align-items:center;}
.btn{font-family:var(--fb);font-size:.78rem;font-weight:500;padding:7px 14px;border-radius:var(--r);cursor:pointer;border:1px solid;transition:all .15s;}
.b-ghost{background:transparent;border-color:var(--br2);color:var(--tx2);}.b-ghost:hover{color:var(--tx1);border-color:var(--br3);}
.b-gold{background:var(--acc);border-color:var(--acc2);color:#fff;}.b-gold:hover{background:var(--acc2);box-shadow:0 2px 8px rgba(99,102,241,.3);}
.b-del{background:transparent;border-color:#fca5a5;color:var(--red);margin-right:auto;}.b-del:hover{background:rgba(220,38,38,.06);}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.vp{background:var(--bg2);border:1px solid var(--br1);border-radius:12px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow3);}
.vp::-webkit-scrollbar{width:4px;}.vp::-webkit-scrollbar-thumb{background:var(--br2);}
.vp-hdr{padding:16px 22px 12px;border-bottom:1px solid var(--br1);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);}
.vp-title{font-size:.92rem;font-weight:600;color:var(--tx1);}
.vp-body{padding:18px 22px;display:flex;flex-direction:column;gap:16px;}
.vp-sec{font-size:.68rem;font-weight:700;letter-spacing:.06em;color:var(--tx3);text-transform:uppercase;margin-bottom:7px;}
.db-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:7px;background:var(--bg3);border:1px solid var(--br1);border-radius:var(--r);padding:12px 14px;}
.db-st .n{font-size:1.05rem;font-weight:700;color:var(--acc);}.db-st .l{font-size:.65rem;font-weight:500;color:var(--tx3);}
.pdf-cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.pdc{background:var(--bg3);border:1px solid var(--br1);border-radius:var(--r);padding:11px 14px;}
.pdc-game{font-size:.65rem;font-weight:600;letter-spacing:.06em;color:var(--tx3);text-transform:uppercase;margin-bottom:4px;}
.pdc-label{font-size:.82rem;font-weight:600;color:var(--tx1);margin-bottom:3px;}
.pdc-link{font-size:.68rem;margin-top:5px;}.pdc-link a{color:var(--acc);text-decoration:none;}.pdc-link a:hover{text-decoration:underline;}
.act-row{display:flex;gap:7px;flex-wrap:wrap;}
.act-btn{font-family:var(--fb);font-size:.78rem;font-weight:500;padding:7px 14px;border-radius:var(--r);cursor:pointer;border:1px solid;transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.act-btn:disabled{opacity:.3;cursor:not-allowed;}
.ab-gold{background:var(--acc);border-color:var(--acc2);color:#fff;}.ab-gold:hover{background:var(--acc2);}
.ab-ghost{background:var(--bg3);border-color:var(--br2);color:var(--tx2);}.ab-ghost:hover{border-color:var(--br3);}
.ab-green{background:rgba(22,163,74,.06);border-color:var(--greendim);color:var(--green);}
.info-box{background:var(--bg3);border:1px solid var(--br1);border-radius:var(--r);padding:13px 15px;font-size:.78rem;color:var(--tx2);line-height:1.7;}
.info-box strong{color:var(--tx1);font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;}
.toast{position:fixed;bottom:20px;right:20px;z-index:400;background:var(--bg2);border:1px solid var(--br1);border-radius:var(--r);padding:10px 16px;color:var(--tx1);font-size:.82rem;box-shadow:var(--shadow2);animation:toastIn .3s ease-out;}
.toast.success{border-color:var(--greendim);background:#f0fdf4;}.toast.error{border-color:#fca5a5;background:#fef2f2;}
@media(max-width:600px){
  .sidebar{width:0;min-width:0;overflow:hidden;transition:width .2s;position:fixed;top:0;bottom:0;left:0;z-index:60;}.sidebar.open{width:220px;min-width:220px;}
  .tb-title{display:none;}.srch{width:120px;}.stat .l{font-size:.55rem;}.stat .n{font-size:.8rem;}.hdr-stats{gap:6px;flex-wrap:wrap;}.vdiv{display:none;}
  .hdr{flex-wrap:wrap;gap:6px;}
  .pdf-cards{grid-template-columns:1fr;}.db-grid{grid-template-columns:repeat(3,1fr);}.grid{grid-template-columns:1fr;}
  .pm-grid{grid-template-columns:repeat(auto-fill,minmax(40px,1fr));}
  .mob-menu{display:block !important;}
  .modal{max-height:85vh;max-height:85dvh;}
  .ov{padding:8px;align-items:flex-start;padding-top:40px;}
  .card-img{height:200px;}
  .mftr{position:sticky;bottom:0;background:var(--bg2);border-top:1px solid var(--br1);z-index:10;}
}

/* ── CARD IMAGE ── */
.card-img{position:relative;height:260px;overflow:hidden;background:var(--img-bg,#334);background-size:contain;background-position:center;background-repeat:no-repeat;transition:background-image .3s;border-radius:var(--r) var(--r) 0 0;}
.card:hover .card-img{filter:brightness(1.05);}
.card-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;opacity:.25;user-select:none;}
.card-img-btn{position:absolute;top:7px;right:7px;background:rgba(15,23,42,.6);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#fff;cursor:pointer;padding:3px 8px;font-size:.7rem;opacity:0;transition:opacity .15s;backdrop-filter:blur(4px);}
.card:hover .card-img-btn{opacity:1;}
.card-img-edit{position:absolute;inset:0;background:rgba(15,23,42,.88);display:flex;flex-direction:column;gap:6px;padding:10px;backdrop-filter:blur(4px);z-index:10;}
.img-url-input{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:6px 9px;color:#fff;font-family:var(--fb);font-size:.75rem;outline:none;width:100%;}
.img-url-input::placeholder{color:rgba(255,255,255,.4);}
.img-url-input:focus{border-color:var(--acc);}
.img-edit-row{display:flex;gap:5px;}
.img-btn{font-family:var(--fb);font-size:.72rem;font-weight:500;padding:5px 10px;border-radius:5px;cursor:pointer;border:1px solid;transition:all .12s;white-space:nowrap;}
.img-btn-save{background:var(--acc);border-color:var(--acc2);color:#fff;flex:1;}
.img-btn-save:hover{background:var(--acc2);}
.img-btn-search{background:transparent;border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.8);text-decoration:none;display:flex;align-items:center;gap:4px;}
.img-btn-search:hover{border-color:rgba(255,255,255,.6);color:#fff;}
.img-btn-clear{background:transparent;border-color:rgba(220,38,38,.5);color:#f87171;}
.img-btn-clear:hover{background:rgba(220,38,38,.15);}

/* ── STATUS LEGEND BAR (main grid view) ── */
.legend-bar{padding:5px 16px;background:var(--bg3);border-bottom:1px solid var(--br1);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.leg-section{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.leg-title{font-size:.6rem;font-weight:700;letter-spacing:.07em;color:var(--tx4);text-transform:uppercase;white-space:nowrap;padding-right:2px;}
.leg-sep{width:1px;height:14px;background:var(--br2);margin:0 4px;}
/* ── STAGE PILLS — cards, legend bar, modal ── */
.stage-pill{display:inline-flex;align-items:center;gap:3px;font-size:.68rem;font-weight:500;padding:2px 8px;border-radius:20px;border:1px solid;white-space:nowrap;line-height:1.4;}
/* ── STAGE PILLS — card summary layout ── */
.stage-pills{margin:6px 0 3px;}
.stage-row{display:flex;align-items:center;gap:4px;margin-bottom:4px;flex-wrap:wrap;}
.stage-row-lbl{font-size:.59rem;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:.05em;width:40px;flex-shrink:0;}
/* ── MODEL PROGRESS BAR (thin strip below pills) ── */
.prog-bar{height:4px;border-radius:2px;overflow:hidden;display:flex;gap:1px;margin:4px 0 3px;}
.prog-seg{height:100%;}
/* ── PER-MODEL GRID: status abbreviation text ── */
.pm-stage-lbl{font-size:.52rem;text-align:center;margin-top:2px;line-height:1.4;font-weight:600;}

/* ═══ REMOTE ERROR LOGGING ═══
   Writes to /errorLog (top-level), separate from /users/{uid}/...
   so it can succeed even when per-user writes are failing. */
function logError(where, err, extra){
  try{
    const cu = firebase.auth().currentUser;
    const payload = {
      where: String(where||"unknown"),
      message: (err && err.message) ? String(err.message) : String(err||""),
      code: (err && err.code) ? String(err.code) : null,
      name: (err && err.name) ? String(err.name) : null,
      stack: (err && err.stack) ? String(err.stack).slice(0,2000) : null,
      uid: cu ? cu.uid : null,
      email: cu ? cu.email : null,
      reactUid: (extra && extra.reactUid) || null,
      modelCount: (extra && typeof extra.modelCount === "number") ? extra.modelCount : null,
      modelId: (extra && extra.modelId) || null,
      undefinedFields: (extra && extra.undefinedFields) || null,
      userAgent: navigator.userAgent || null,
      url: location.href || null,
      appVersion: APP_VERSION,
      appBuild: APP_BUILD,
      clientTime: new Date().toISOString(),
      serverTime: firebase.firestore.FieldValue.serverTimestamp()
    };
    // Best effort — swallow *this* catch only, since it's the fallback-of-last-resort
    fsdb.collection("errorLog").add(payload).catch(e=>{
      console.error("[HDL] logError itself failed:", e && e.message, e);
    });
  }catch(e){
    console.error("[HDL] logError threw:", e);
  }
}

const MSI=Object.fromEntries(MS.map((s,i)=>[s.id,i]));

function migrateModel(m){
  if(m.stage&&!m.modelStage){const MAP={unbuilt:["unbuilt","bare"],built:["built","bare"],primed:["primed","bare"],base_coated:["painted","bare"],detailed:["detailed","bare"],based:["detailed","detailed"],varnished:["detailed","detailed"],complete:["detailed","detailed"]};const[ms,bs]=MAP[m.stage]||MAP.unbuilt;m.modelStage=ms;m.baseStage=bs;delete m.stage;}
  if(!m.perModel||!Array.isArray(m.perModel)){const q=m.quantity||1;m.perModel=Array.from({length:q},()=>({ms:m.modelStage||"unbuilt",bs:m.baseStage||"bare"}));}
  while(m.perModel.length<(m.quantity||1))m.perModel.push({ms:"unbuilt",bs:"bare"});
  if(m.perModel.length>(m.quantity||1))m.perModel=m.perModel.slice(0,m.quantity||1);
  return m;
}

  const dbRef = db || UNIT_DB;
  const unitList=dbRef[m.faction]||[];
  const d=unitList.find(x=>x.name.toLowerCase()===m.name.toLowerCase());
  if(!d)return m;
  const pts=parseInt(m.points)||0;
  const qty=m.quantity||1;
  /* Try match by points first */
  let sz=d.sizes.find(s=>s.p===pts);
  /* If points don't match any size, try match by model count instead and fix points */
  if(!sz) sz=d.sizes.find(s=>s.m===qty);
  if(!sz)return m;
  const changed={...m,baseSize:m.baseSize||d.base};
  if(changed.quantity!==sz.m){
    const oldPM=Array.isArray(m.perModel)?m.perModel:[];
    changed.quantity=sz.m;
    changed.perModel=Array.from({length:sz.m},(_,i)=>oldPM[i]||{ms:"unbuilt",bs:"bare"});
  }
  if(pts!==sz.p) changed.points=String(sz.p);
  return changed;
}

function sortModels(arr,key){

// Images come exclusively from gw-images.json (curated by gw-image-scraper.js).
// Missing images should be fixed in Forge and published to the unit database.
async function fetchUnitImage(name,game){
  await GW_IMAGES_READY;
  if(GW_IMAGES[name])return GW_IMAGES[name];
  const lower=name.toLowerCase();
  const exactCI=Object.keys(GW_IMAGES).find(k=>k.toLowerCase()===lower);
  if(exactCI)return GW_IMAGES[exactCI];
  const words=name.split(/\s+/);
  for(let i=1;i<words.length-1;i++){
    const suffix=words.slice(i).join(' ');
    if(GW_IMAGES[suffix])return GW_IMAGES[suffix];
    const suffixCI=Object.keys(GW_IMAGES).find(k=>k.toLowerCase()===suffix.toLowerCase());
    if(suffixCI)return GW_IMAGES[suffixCI];
  }
  const keys=Object.keys(GW_IMAGES);
  const sub=keys.find(k=>lower.includes(k.toLowerCase())&&k.length>5);
  if(sub)return GW_IMAGES[sub];
  return null;
}
function lsGet(k){try{return JSON.parse(localStorage.getItem(k));}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function scoreMatch(n,q){n=n.toLowerCase();q=q.toLowerCase().trim();if(!q)return 0;if(n===q)return 100;if(n.startsWith(q))return 90;if(n.includes(q))return 70;const w=n.split(/[\s\-,()]+/);if(w.some(x=>x.startsWith(q)))return 60;return 0;}
function searchUnits(fac,q,lim=9,db){const unitDB_=(db||UNIT_DB);const u=unitDB_[fac]||[];if(!q.trim())return[];return u.map(x=>({...x,score:scoreMatch(x.name,q)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,lim);}

/* ═══ ROSTER PARSER ═══ */
function parseRoster(text){
  const lines=text.split("\n").map(l=>l.trimEnd());const results=[];let fac=null,game=null,inTerrain=false;
  for(const f of ALL_FACTIONS)if(text.includes(f)){fac=f;game=FACTION_META[f]?.game;break;}
  if(!game){if(/age of sigmar|aos/i.test(text))game="Age of Sigmar";else if(/space marines|40,?000|40k/i.test(text))game="Warhammer 40,000";}
  const aosPat=/^([A-Z][\w\s',\-\u2013\u2014()]+?)\s*\((\d+)\)\s*$/;
  const w40kPat=/^([A-Z][\w\s',\-\u2013\u2014()]+?)\s*\((\d+)\s*points?\)\s*$/;
  for(let i=0;i<lines.length;i++){
    const tr=lines[i].trim();
    if(/^faction terrain$/i.test(tr)){inTerrain=true;continue;}
    if(/^\s{4,}/.test(lines[i])||/^\s*[\u2022\u25CF\u25E6\u25AA\-]\s/.test(tr))continue;
    if(/^(CHARACTERS|BATTLELINE|OTHER DATASHEETS|ALLIED|DEDICATED)/i.test(tr))continue;
    if(/^(General|Drops|Spell Lore|Manifestation|Auxiliary|Created with|Exported with|App:|Data:)/i.test(tr))continue;
    if(/^\d+x\s/.test(tr))continue;
    let m=tr.match(w40kPat);if(m){results.push({name:m[1].trim(),points:+m[2],isTerrain:false});continue;}
    m=tr.match(aosPat);if(m){results.push({name:m[1].trim(),points:+m[2],isTerrain:inTerrain});continue;}
    if(inTerrain&&/^[A-Z]/.test(tr)&&tr.length>3&&!tr.includes("Created"))results.push({name:tr,points:0,isTerrain:true});
  }
  return{faction:fac,game,units:results};
}
function rosterToModels(parsed,faction,unitDB_){
  const db=(unitDB_||UNIT_DB)[faction]||[];
  return parsed.units.map(u=>{const d=db.find(x=>x.name.toLowerCase()===u.name.toLowerCase());let qty=1,baseSize="",cat=u.isTerrain?"terrain":"unit";if(d){baseSize=d.base;cat=d.cat||cat;const sz=d.sizes.find(s=>s.p===u.points);qty=sz?sz.m:d.sizes[0]?.m||1;}return migrateModel({id:Date.now()+Math.random(),name:u.name,faction,quantity:qty,points:String(u.points),baseSize,cat,modelStage:"unbuilt",baseStage:"bare",notes:""});});
}

/* ═══ APP ═══ */
function App(){
  const[user,setUser]=React.useState(undefined); // undefined=loading, null=logged out
  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(u=>setUser(u||null));
    return unsub;
  },[]);

  const[unitDB,setUnitDB]=React.useState(UNIT_DB); // start with hardcoded, then load from Firebase
  const[allFactions,setAllFactions]=React.useState(ALL_FACTIONS);

  // Normalise faction names from Firestore (may be ALL CAPS) to match FACTIONS constant
  const _facNorm=React.useMemo(()=>{
    const m={};
    for(const f of ALL_FACTIONS)m[f.toUpperCase()]=f;
    return m;
  },[]);
  const normFaction=f=>_facNorm[f?.toUpperCase()]||f;

  useEffect(()=>{
    if(!user)return;
    fsdb.collection("unitDatabase").doc("_meta").get().then(meta=>{
      if(!meta.exists)return;
      const factions=meta.data().factions||[];
      Promise.all(factions.map(f=>fsdb.collection("unitDatabase").doc(f).get()))
        .then(docs=>{
          const db={};
          for(const doc of docs){
            if(doc.exists){
              const d=doc.data();
              const fac=normFaction(d.faction);
              db[fac]=(d.units||[]).map(u=>({
                name:u.name,base:u.base||"",cat:u.cat||"unit",
                sizes:u.sizes||[{m:1,p:0}],imgUrl:u.imgUrl||""
              }));
            }
          }
          if(Object.keys(db).length>0){
            setUnitDB(db);
            setAllFactions(Object.keys(db).sort());
          }
        });
    });
  },[user]);

  const[models,setModels]=useState([]);
  const[faction,setFaction]=useState("All");const[stageF,setStageF]=useState("all");
  const[sortKey,setSortKey]=useState("name_asc");
  const[search,setSearch]=useState("");const[editing,setEditing]=useState(null);
  const[showAdd,setShowAdd]=useState(false);const[showVer,setShowVer]=useState(false);
  const[showRoster,setShowRoster]=useState(false);
  const[showFeedback,setShowFeedback]=useState(false);
  const[sideOpen,setSideOpen]=useState(false);const[toast,setToast]=useState(null);
  const[unitImages,setUnitImages]=useState(()=>{try{return JSON.parse(localStorage.getItem(LS_IMAGES)||'{}')}catch(e){return{};}});
  const[loadingImgs,setLoadingImgs]=useState(false);
  const saveUnitImage=useCallback((name,url)=>{
    setUnitImages(prev=>{const n=url?{...prev,[name]:url}:Object.fromEntries(Object.entries(prev).filter(([k])=>k!==name));localStorage.setItem(LS_IMAGES,JSON.stringify(n));return n;});
  },[]);
  const loadFactionImages=useCallback(async(fac)=>{
    if(loadingImgs)return;
    const targetFaction=fac||faction;
    const filteredModels=targetFaction==='All'?models:models.filter(m=>m.faction===targetFaction);
    const units=[...new Set(filteredModels.map(m=>m.name))].filter(n=>!unitImages[n]);
    if(!units.length)return;
    setLoadingImgs(true);
    const results=await Promise.allSettled(units.map(n=>{
      const game=FACTION_META[filteredModels.find(m=>m.name===n)?.faction]?.game;
      return fetchUnitImage(n,game).then(url=>({n,url}));
    }));
    setUnitImages(prev=>{
      const next={...prev};
      for(const r of results)if(r.status==='fulfilled'&&r.value?.url)next[r.value.n]=r.value.url;
      localStorage.setItem(LS_IMAGES,JSON.stringify(next));
      return next;
    });
    setLoadingImgs(false);
  },[faction,models,unitImages,loadingImgs]);

  // Auto-load images once models are loaded from Firestore
  const _autoImgDone=useRef(false);
  useEffect(()=>{
    if(models.length>0&&!_autoImgDone.current){
      _autoImgDone.current=true;
      loadFactionImages('All');
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[models]);

  useEffect(()=>{
    if(!user){setModels([]);return;}
    console.log('[HDL] Initial load for uid:',user.uid,'email:',user.email);
    fsdb.collection("users").doc(user.uid).collection("models").get()
      .then(snap=>{
        console.log('[HDL] Initial load succeeded. docs:',snap.size,'empty:',snap.empty);
        if(!snap.empty){
          // Primary path: load from Firestore
          const m=snap.docs.map(d=>migrateModel({...d.data(),id:d.id,faction:normFaction(d.data().faction)})).map(x=>syncWithDB(x,unitDB));
          setModels(m);
        } else {
          // Firestore empty — only migrate from localStorage if it was saved by THIS user
          const local=lsGet(LS_MODELS);
          const localUid=localStorage.getItem('hdl-uid');
          console.log('[HDL] Firestore empty. local count:',local?local.length:0,'localUid match:',localUid===user.uid);
          if(local&&local.length&&localUid===user.uid){
            const m=local.map(x=>migrateModel({...x,faction:normFaction(x.faction)})).map(x=>syncWithDB(x,unitDB));
            setModels(m);
            // Write to Firestore and clear localStorage
            try{
              const batch=fsdb.batch();
              for(const model of m){
                batch.set(fsdb.collection("users").doc(user.uid).collection("models").doc(String(model.id)),model);
              }
              batch.commit().then(()=>{
                console.log('[HDL] Migration commit succeeded. migrated:',m.length);
                localStorage.removeItem(LS_MODELS);
                localStorage.removeItem('hdl-uid');
              }).catch(err=>{
                console.error('[HDL] Migration batch.commit failed:',err&&err.code,err&&err.message,err);
                logError('migration.commit',err,{reactUid:user.uid,modelCount:m.length});
              });
            }catch(err){
              console.error('[HDL] Migration batch.set threw synchronously:',err&&err.message,err);
              logError('migration.set.sync',err,{reactUid:user.uid,modelCount:m.length});
            }
          }
          // else: genuinely new user — start with empty collection
        }
      })
      .catch(err=>{
        console.error('[HDL] Firestore initial load failed:',err&&err.code,err&&err.message,err);
        logError('initialLoad',err,{reactUid:user.uid});
        // Firestore unavailable — offline fallback, only for same user
        const local=lsGet(LS_MODELS);
        const localUid=localStorage.getItem('hdl-uid');
        if(local&&localUid===user.uid){
          const m=local.map(migrateModel).map(x=>syncWithDB(x,unitDB));
          setModels(m);
        }
      });
  },[user]);

  const showToast=useCallback((msg,type)=>setToast({message:msg,type,key:Date.now()}),[]);
  const saveModels=useCallback(m=>{
    setModels(m);
    // Tag localStorage with UID so it's never migrated to a different account
    lsSet(LS_MODELS,m);
    if(user)localStorage.setItem('hdl-uid',user.uid);
    if(user){
      // Diagnostic: capture auth state at save time
      try{
        const cu=firebase.auth().currentUser;
        console.log('[HDL] saveModels called. react user.uid:',user.uid,'firebase currentUser.uid:',cu&&cu.uid,'match:',cu&&cu.uid===user.uid,'email:',user.email,'modelCount:',m.length);
        if(cu){
          cu.getIdTokenResult().then(t=>{
            console.log('[HDL] auth token: issuedAt:',t.issuedAtTime,'expirationTime:',t.expirationTime,'authTime:',t.authTime);
          }).catch(e=>console.error('[HDL] getIdTokenResult failed:',e));
        }else{
          console.error('[HDL] firebase.auth().currentUser is NULL at save time — token will be missing from Firestore request');
        }
      }catch(e){
        console.error('[HDL] auth diagnostic threw:',e);
      }
      try{
        const batch=fsdb.batch();
        for(const model of m){
          try{
            // Diagnostic: log any undefined fields which Firestore will reject
            const undefKeys=Object.keys(model).filter(k=>model[k]===undefined);
            if(undefKeys.length){
              console.warn('[HDL] model',model.id,'has undefined fields:',undefKeys);
              logError('saveModels.undefinedFields',new Error('undefined fields: '+undefKeys.join(',')),{reactUid:user.uid,modelId:String(model.id),undefinedFields:undefKeys.join(',')});
            }
            batch.set(fsdb.collection("users").doc(user.uid).collection("models").doc(String(model.id)),model);
          }catch(setErr){
            console.error('[HDL] batch.set threw for model',model&&model.id,':',setErr&&setErr.message,setErr,'payload:',model);
            logError('saveModels.set.sync',setErr,{reactUid:user.uid,modelId:model&&String(model.id),modelCount:m.length});
            showToast('Save error (model '+(model&&model.id)+'): '+(setErr&&setErr.message),'error');
            throw setErr;
          }
        }
        // Delete removed models
        fsdb.collection("users").doc(user.uid).collection("models").get().then(snap=>{
          const ids=new Set(m.map(x=>String(x.id)));
          const delBatch=fsdb.batch();
          let hasDel=false;
          snap.docs.forEach(d=>{if(!ids.has(String(d.id))){delBatch.delete(d.ref);hasDel=true;}});
          if(hasDel){
            delBatch.commit().then(()=>{
              console.log('[HDL] delete batch committed');
            }).catch(err=>{
              console.error('[HDL] delete batch.commit failed:',err&&err.code,err&&err.message,err);
              logError('saveModels.deleteCommit',err,{reactUid:user.uid,modelCount:m.length});
              showToast('Delete sync failed: '+(err&&err.message),'error');
            });
          }
        }).catch(err=>{
          console.error('[HDL] delete-phase collection.get failed:',err&&err.code,err&&err.message,err);
          logError('saveModels.deletePhaseGet',err,{reactUid:user.uid,modelCount:m.length});
        });
        batch.commit().then(()=>{
          console.log('[HDL] saveModels batch.commit succeeded. wrote:',m.length,'docs');
        }).catch(err=>{
          console.error('[HDL] saveModels batch.commit FAILED:',err&&err.code,err&&err.message,err);
          logError('saveModels.commit',err,{reactUid:user.uid,modelCount:m.length});
          showToast('Save failed: '+(err&&err.message||'unknown error'),'error');
        });
      }catch(err){
        console.error('[HDL] saveModels threw synchronously:',err&&err.message,err);
        logError('saveModels.sync',err,{reactUid:user.uid,modelCount:m.length});
        showToast('Save error: '+(err&&err.message||'unknown'),'error');
      }
    }
  },[user,showToast]);
  const saveModel=m=>{m=syncWithDB(m,unitDB);return models.find(x=>x.id===m.id)?saveModels(models.map(x=>x.id===m.id?m:x)):saveModels([...models,m]);};
  const delModel=id=>saveModels(models.filter(m=>m.id!==id));
  const handleImport=useCallback(m=>saveModels(m),[saveModels]);

  const counts=allFactions.reduce((a,f)=>({...a,[f]:models.filter(m=>m.faction===f).length}),{});
  const filtered=models.filter(m=>{
    if(faction!=="All"&&m.faction!==faction)return false;
    if(!matchesFilter(m,stageF))return false;
    if(search&&!m.name.toLowerCase().includes(search.toLowerCase())&&!m.faction.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });
  const sorted=sortModels(filtered,sortKey);
  const totalPts=models.reduce((s,m)=>s+(parseInt(m.points)||0),0);
  const filteredPts=filtered.reduce((s,m)=>s+(parseInt(m.points)||0),0);
  const complete=models.filter(m=>unitSummary(m.perModel||[]).allDone).length;
  const initFac=faction!=="All"?faction:allFactions[0]||ALL_FACTIONS[0];

  if(user===undefined)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"var(--bg1)",color:"rgba(248,250,252,.4)",fontSize:".9rem"}}>Loading…</div>;
  if(!user)return <LoginScreen/>;

  return(<div className="app">
    <header className="hdr">
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button style={{background:"none",border:"none",color:"var(--hdrtx)",cursor:"pointer",fontSize:"1.1rem",padding:"0 6px 0 0",display:"none"}} className="mob-menu" onClick={()=>setSideOpen(o=>!o)}>☰</button>
        <div><div className="logo-title">⚔ HOBBY DEBT LEDGER</div><div className="logo-sub">{"Collection Tracker · "+APP_VERSION}</div></div>
      </div>
      <div className="hdr-stats">
        <div className="vdiv"/><div className="stat"><span className="n">{filtered.length}</span><span className="l">Units</span></div>
        <div className="vdiv"/><div className="stat"><span className="n">{filteredPts.toLocaleString()}</span><span className="l">Points</span></div>
        {faction!=="All"&&<><div className="vdiv"/><div className="stat"><span className="n">{totalPts.toLocaleString()}</span><span className="l">Total Pts</span></div></>}
        <div className="vdiv"/><div className="stat"><span className="n">{complete}</span><span className="l">Complete</span></div>
        <div className="vdiv"/><span style={{color:"rgba(248,250,252,.5)",fontSize:".72rem",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user?.email}</span>
        <button onClick={()=>auth.signOut()} style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.12)",color:"rgba(248,250,252,.6)",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:".72rem",fontFamily:"var(--fb)"}}>Sign Out</button>
      </div>
    </header>
    <div className="main">
      <nav className={"sidebar"+(sideOpen?" open":"")}>
        <div className="sb-label">Collection</div>
        <button className={"sb-btn"+(faction==="All"?" active":"")} onClick={()=>{setFaction("All");setSideOpen(false);}}>{"☰ All Factions"}<span className="sb-ct">{models.length}</span></button>
        {Object.entries(FACTIONS).map(([game,facs])=>{const vis=facs.filter(f=>counts[f]>0);if(!vis.length)return null;return(<div key={game}><div className="sb-game">{game}</div>{vis.map(f=><button key={f} className={"sb-btn"+(faction===f?" active":"")} onClick={()=>{setFaction(f);setSideOpen(false);}}><span className="fdot" style={{background:FACTION_META[f]?.primary}}/>{f}<span className="sb-ct">{counts[f]}</span></button>)}</div>);})}
        <div className="sb-div"/>
        <button className="sb-act" onClick={()=>{setShowVer(true);setSideOpen(false);}}>⚙ Data & Versions</button>
        <button className="sb-act" onClick={()=>{setShowFeedback(true);setSideOpen(false);}}>🐛 Report an Issue</button>
      </nav>
      {sideOpen&&<div onClick={()=>setSideOpen(false)} style={{position:"fixed",inset:0,zIndex:50,background:"rgba(0,0,0,.3)"}}/>}
      <div className="content">
        <div className="toolbar">
          <span className="tb-title">{faction==="All"?"All Units":faction}</span>
          <input className="srch" placeholder="Filter…" value={search} onChange={e=>setSearch(e.target.value)}/>
          <select className="stg-sel" value={stageF} onChange={e=>setStageF(e.target.value)}>{FILTER_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select>
          <select className="stg-sel" value={sortKey} onChange={e=>setSortKey(e.target.value)} title="Sort order" style={{minWidth:160}}><optgroup label="Sort by">{SORT_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</optgroup></select>
          {faction!=="All"&&<button className="tb-btn tb-imp" onClick={loadFactionImages} disabled={loadingImgs}>{loadingImgs?"Loading…":"🖼 Load Images"}</button>}<button className="tb-btn tb-imp" onClick={()=>setShowRoster(true)}>📋 Import</button>
          <button className="tb-btn tb-add" onClick={()=>setShowAdd(true)}>+ Add Unit</button>
        </div>
        <StatusLegend/>
        <div className="grid">
          {sorted.length===0?(<div className="empty"><div className="empty-ico">⚔</div><h3>{models.length===0?"Your Collection Is Empty":"No Units Match"}</h3><p>{models.length===0?"Add your first unit to begin.":"Adjust your filters."}</p></div>
          ):sorted.map(m=><ModelCard key={m.id} model={m} onClick={()=>setEditing(m)} unitImages={unitImages} onSetImage={saveUnitImage}/>)}
        </div>
      </div>
    </div>
    {showAdd&&<UnitModal init={{faction:initFac}} onSave={saveModel} onDelete={delModel} onClose={()=>setShowAdd(false)} unitDB={unitDB}/>}
    {editing&&<UnitModal init={editing} onSave={saveModel} onDelete={delModel} onClose={()=>setEditing(null)} unitDB={unitDB}/>}
    {showVer&&<VersionPanel models={models} onClose={()=>setShowVer(false)} onImport={handleImport} onToast={showToast} unitDB={unitDB}/>}
    {showRoster&&<RosterModal existing={models} onImport={saveModels} onClose={()=>setShowRoster(false)} onToast={showToast} unitDB={unitDB}/>}
    {showFeedback&&<FeedbackModal onClose={()=>setShowFeedback(false)} onToast={showToast}/>}
    {toast&&<Toast key={toast.key} message={toast.message} type={toast.type} onDone={()=>setToast(null)}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw-hdl.js').catch(e=>console.warn('SW reg failed:',e));
  });
}
</script>
</body>
</html>
